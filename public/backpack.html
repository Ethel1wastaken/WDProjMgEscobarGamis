<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conway's Playground">
    <meta name="keywords" content="Conway's Game of Life">
    <meta name="author" content="Joanna Escobar, Elijah Gamis">
    
    <title> My Backpack </title>
    <link rel="stylesheet" href="../styles2.css">
    <link rel="stylesheet" href="../joanna's testing grounds/dropdown.css">
    <link rel="stylesheet" href="../font-awesome-4.7.0/font-awesome-4.7.0/css/font-awesome.min.css">

    <style>
        .fa-angle-down {
            color: inherit;
        }

        .fa-search {
            color: inherit;
        }

        .fa-filter {
            color: inherit;
        }
    </style>

    <script src="../navbar.js" defer></script>

</head>
<body>
    <header>
        <nav>
            <div class="navbar">
                <div id="siteLogo">
                    <a href="../home.html"> <img src="../assets/logoFinal.png" alt="Logo" title="Conway's Playground Logo" width="90vw" height="90vh"></a>
                    <h2 class="inline-header"> Conway's Playground </h2>
                </div>
                    
                <div class="buttons-container">
                    <button onclick="window.location.href='./index.html'"> Maker </button><button onclick="window.location.href='./backpack.html'"> Backpack </button>
                </div>

                <dialog id="accountsDisplay" style="z-index: 10;">
                </dialog>

                <div class="dropdown">
                    <button class="dropbtn" id="profile" onclick="dropdown()"> <i class="fa fa-user-circle-o" aria-hidden="true"></i></button>
                    <div class="dropdown-content" id="accountsDropdown">
                        <p id="usernameOutput"> </p>
                        <hr width="100%" size="1">
                        <button onclick="displayAcc()"> Switch Accounts </button>
                        <a class="noAccount" href="public/settings.html"> Settings </a>
                        <a href="public/signup.html" onclick="logOut()"> Log Out </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="title">
        <h1> My Backpack </h1>
    </section>

    <section>
        <button class="collapsible" id="recents"> Recents </button>
        <div class="content" id="recentsContent" style="background-color: light-dark(#d7faa2, #45795b);">
            <p>No recent patterns.</p>
        </div>
    </section>
    
    <section>
        <button class="collapsible" id="myCreations"> My Creations </button>
        <div class="content" id="myCreationsContent" style="background-color: light-dark(#f4adc9, #934165);">
            <p>No patterns created yet.</p>
        </div>
    </section>

    <section>
        <button class="collapsible" id="otherCreators"> Other Creators </button>
        <div class="content" id="otherCreatorsContent" style="background-color: light-dark(#c4fcf9, #59548e);">
            <p>No shared patterns available.</p>
        </div>
    </section>

    <script>
        // Collapsible toggling
        const coll = document.getElementsByClassName("collapsible")
        for (let i = 0; i < coll.length; i++) {
            coll[i].addEventListener("click", function() {
                this.classList.toggle("open")
                let content = this.nextElementSibling
                if (content.style.display === "block") 
                    content.style.display = "none"
                else 
                    content.style.display = "block"
            })
        }

        // Load saved patterns from localStorage
        const loadBackpack = () => {
            const myCreations = [];
            
            // Get all saved patterns from localStorage (pattern_*)
            for (let key in localStorage) {
                if (key.startsWith('pattern_')) {
                    try {
                        const p = JSON.parse(localStorage.getItem(key));
                        myCreations.push({ ...p, key });
                    } catch (e) {
                        console.error('Error parsing pattern:', key, e);
                    }
                }
            }
            
            // Sort by timestamp (newest first)
            myCreations.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            const renderPatternList = (patterns, containerId) => {
                const container = document.getElementById(containerId);
                if (!patterns || patterns.length === 0) {
                    container.innerHTML = '<p>No patterns in this section.</p>';
                    return;
                }
                
                const list = document.createElement('div');
                list.className = 'patterns-grid';
                
                patterns.forEach((p, idx) => {
                    const card = document.createElement('article');
                    card.className = 'pattern-card';
                    
                    // Card header (visible not-hovered)
                    const header = document.createElement('header');
                    header.className = 'pattern-card__header';
                    
                    // Thumbnail
                    let thumbnail = null;
                    if (p.thumbnail) {
                        thumbnail = document.createElement('img');
                        thumbnail.className = 'pattern-card__thumbnail';
                        thumbnail.src = p.thumbnail;
                        thumbnail.alt = `${p.title} preview`;
                        header.appendChild(thumbnail);
                    }
                    
                    const date = document.createElement('time');
                    date.className = 'pattern-card__date';
                    date.dateTime = p.timestamp;
                    date.textContent = new Date(p.timestamp).toLocaleDateString();
                    
                    const title = document.createElement('h3');
                    title.className = 'pattern-card__title';
                    title.textContent = p.title || `Pattern ${idx + 1}`;
                    
                    const tagsNotHovered = document.createElement('div');
                    tagsNotHovered.className = 'pattern-card__tags pattern-card__tags--not-hovered';
                    tagsNotHovered.textContent = p.tags && p.tags.length ? `Tags: ${p.tags.join(', ')}` : '(no tags)';
                    
                    header.appendChild(date);
                    header.appendChild(title);
                    header.appendChild(tagsNotHovered);
                    
                    // Card details (visible on hover)
                    const details = document.createElement('section');
                    details.className = 'pattern-card__details';
                    
                    const titleHovered = document.createElement('h3');
                    titleHovered.className = 'pattern-card__title pattern-card__title--hovered';
                    titleHovered.textContent = p.title || `Pattern ${idx + 1}`;
                    
                    const tagsHovered = document.createElement('div');
                    tagsHovered.className = 'pattern-card__tags pattern-card__tags--hovered';
                    tagsHovered.textContent = p.tags && p.tags.length ? `Tags: ${p.tags.join(', ')}` : '(no tags)';
                    
                    const description = document.createElement('p');
                    description.className = 'pattern-card__description';
                    description.textContent = p.description || '(no description)';
                    
                    const username = document.createElement('p');
                    username.className = 'pattern-card__username';
                    username.textContent = `By ${p.username || 'Unknown'}`;
                    
                    const dateHovered = document.createElement('time');
                    dateHovered.className = 'pattern-card__date pattern-card__date--hovered';
                    dateHovered.dateTime = p.timestamp;
                    dateHovered.textContent = new Date(p.timestamp).toLocaleDateString();
                    
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'pattern-card__btn';
                    btn.textContent = 'Open in Maker';
                    
                    btn.onclick = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        localStorage.setItem('selectedPattern', JSON.stringify(p));
                        window.location.href = './index.html';
                    };
                    
                    details.appendChild(titleHovered);
                    details.appendChild(tagsHovered);
                    details.appendChild(description);
                    details.appendChild(username);
                    details.appendChild(dateHovered);
                    details.appendChild(btn);
                    
                    card.appendChild(header);
                    card.appendChild(details);
                    list.appendChild(card);
                });
                
                container.innerHTML = '';
                container.appendChild(list);
            };
            
            // Display patterns
            renderPatternList(myCreations, 'myCreationsContent');
        };
        
        // Load backpack on page load
        loadBackpack();
    </script>

</body>
</html>
