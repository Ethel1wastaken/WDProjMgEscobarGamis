<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conway's Playground">
    <meta name="keywords" content="Conway's Game of Life">
    <meta name="author" content="Joanna Escobar, Elijah Gamis">
    
    <title> My Backpack </title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../dropdown.css">
    <link rel="stylesheet" href="../font-awesome-4.7.0/font-awesome-4.7.0/css/font-awesome.min.css">

    <style>
        .fa-angle-down {
            color: inherit;
        }

        .fa-search {
            color: inherit;
        }

        .fa-filter {
            color: inherit;
        }
    </style>

    <script src="../dropdown.js" defer></script>

</head>
<body>
    <header>
        <nav>
            <div class="navbar">
                <div id="siteLogo">
                    <a href="../home.html"> <img src="../assets/logoFinal.png" alt="Logo" title="Conway's Playground Logo" width="90vw" height="90vh"></a>
                    <h2 class="inline-header"> Conway's Playground </h2>
                </div>
                    
                <div class="dropdown">
                    <button class="dropbtn"> Create <i class="fa fa-angle-down"></i> </button>
                    <div class="dropdown-content">
                        <a href="./index.html"> Maker </a>
                        <a href="./backpack.html"> Backpack </a>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="dropbtn" id="profile"> <i class="fa fa-user fa-5x"></i></button>
                        <div class="dropdown-content">
                            <p id="usernameOutput"> </p>
                            <a href="signup.html"> Switch Accounts </a> <!-- make dropdown in the future -->
                            <a class="noAccount" href="settings.html"> Settings </a>
                            <a href="signup.html" onclick="logOut()"> Log Out </a>
                        </div>
                </div> 
            </div>
        </nav>
    </header>

    <section class="title">
        <h1> My Backpack </h1>
    </section>

    <section>
        <button class="collapsible" id="recents"> Recents </button>
        <div class="content" id="recentsContent" style="background-color: light-dark(#d7faa2, #45795b);">
            <p>No recent patterns.</p>
        </div>
    </section>
    
    <section>
        <button class="collapsible" id="myCreations"> My Creations </button>
        <div class="content" id="myCreationsContent" style="background-color: light-dark(#f4adc9, #934165);">
            <p>No patterns created yet.</p>
        </div>
    </section>

    <section>
        <button class="collapsible" id="otherCreators"> Other Creators </button>
        <div class="content" id="otherCreatorsContent" style="background-color: light-dark(#c4fcf9, #59548e);">
            <p>No shared patterns available.</p>
        </div>
    </section>

    <script>
        // Collapsible toggling
        const coll = document.getElementsByClassName("collapsible")
        for (let i = 0; i < coll.length; i++) {
            coll[i].addEventListener("click", function() {
                this.classList.toggle("open")
                let content = this.nextElementSibling
                if (content.style.display === "block") 
                    content.style.display = "none"
                else 
                    content.style.display = "block"
            })
        }

        // Load saved patterns from localStorage
        const loadBackpack = () => {
            const myCreations = [];
            
            // Get all saved patterns from localStorage (pattern_*)
            for (let key in localStorage) {
                if (key.startsWith('pattern_')) {
                    try {
                        const p = JSON.parse(localStorage.getItem(key));
                        myCreations.push({ ...p, key });
                    } catch (e) {
                        console.error('Error parsing pattern:', key, e);
                    }
                }
            }
            
            // Sort by timestamp (newest first)
            myCreations.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            const renderPatternList = (patterns, containerId) => {
                const container = document.getElementById(containerId);
                if (!patterns || patterns.length === 0) {
                    container.innerHTML = '<p>No patterns in this section.</p>';
                    return;
                }
                
                const list = document.createElement('div');
                list.style.padding = '8px 12px';
                
                patterns.forEach((p, idx) => {
                    const item = document.createElement('div');
                    item.style.padding = '12px';
                    item.style.marginBottom = '8px';
                    item.style.border = '1px solid rgba(0,0,0,0.2)';
                    item.style.borderRadius = '4px';
                    item.style.cursor = 'pointer';
                    item.style.transition = '0.2s';
                    item.style.background = 'rgba(255,255,255,0.5)';
                    item.style.display = 'flex';
                    item.style.justifyContent = 'space-between';
                    item.style.alignItems = 'flex-start';
                    
                    const content = document.createElement('div');
                    content.style.flex = '1';
                    
                    const title = document.createElement('div');
                    title.style.fontWeight = '600';
                    title.style.fontSize = '14px';
                    title.style.marginBottom = '4px';
                    title.innerText = p.title || `Pattern ${idx + 1}`;
                    
                    const desc = document.createElement('div');
                    desc.style.fontSize = '12px';
                    desc.style.color = '#666';
                    desc.style.marginBottom = '4px';
                    desc.innerText = p.description || '(no description)';
                    
                    const tags = document.createElement('div');
                    tags.style.fontSize = '11px';
                    tags.style.color = '#999';
                    tags.innerText = p.tags && p.tags.length ? `Tags: ${p.tags.join(', ')}` : '(no tags)';
                    
                    content.appendChild(title);
                    content.appendChild(desc);
                    content.appendChild(tags);
                    
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.innerText = 'Open in Maker';
                    btn.style.padding = '6px 12px';
                    btn.style.background = '#333';
                    btn.style.color = 'white';
                    btn.style.border = 'none';
                    btn.style.borderRadius = '3px';
                    btn.style.cursor = 'pointer';
                    btn.style.fontSize = '12px';
                    btn.style.fontWeight = '600';
                    btn.style.marginLeft = '12px';
                    btn.style.whiteSpace = 'nowrap';
                    btn.style.opacity = '0';
                    btn.style.transition = '0.2s';
                    btn.style.zIndex = '10';
                    
                    btn.onclick = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        localStorage.setItem('selectedPattern', JSON.stringify(p));
                        window.location.href = './index.html';
                    };
                    
                    btn.onmouseover = () => btn.style.background = '#555';
                    btn.onmouseout = () => btn.style.background = '#333';
                    
                    item.appendChild(content);
                    item.appendChild(btn);
                    
                    item.onmouseover = () => {
                        item.style.background = 'rgba(0,0,0,0.1)';
                        btn.style.opacity = '1';
                    };
                    item.onmouseout = () => {
                        item.style.background = 'rgba(255,255,255,0.5)';
                        btn.style.opacity = '0';
                    };
                    
                    list.appendChild(item);
                });
                
                container.innerHTML = '';
                container.appendChild(list);
            };
            
            // Display patterns
            renderPatternList(myCreations, 'myCreationsContent');
        };
        
        // Load backpack on page load
        loadBackpack();
    </script>

</body>
</html>
