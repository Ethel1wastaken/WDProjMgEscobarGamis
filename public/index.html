<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conway's Playground">
    <meta name="keywords" content="Conway's Game of Life">
    <meta name="author" content="Joanna Escobar, Elijah Gamis">
    
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="conways_playground.css">
    <link rel="stylesheet" href="../dropdown.css">
    <link rel="stylesheet" href="../font-awesome-4.7.0/font-awesome-4.7.0/css/font-awesome.min.css">

    <style>
        .fa-angle-down {
            color: inherit;
        }

        .fa-search {
            color: inherit;
        }

        .fa-filter {
            color: inherit;
        }
    </style>

    <script src="../dropdown.js" defer></script>

    <script type="module" src="main.js"></script>

    <title>Conway's Game of Life</title>
</head>

<body>
    <header>
        <nav>
            <div class="navbar">
                <div id="siteLogo">
                    <a href="../home.html"> <img src="../assets/logoFinal.png" alt="Logo" title="Conway's Playground Logo" width="90vw" height="90vh"></a>
                    <h2 class="inline-header"> Conway's Playground </h2>
                </div>
                    
                <div class="dropdown">
                    <button class="dropbtn"> Create <i class="fa fa-angle-down"></i> </button>
                    <div class="dropdown-content">
                        <a href="./index.html"> Maker </a>
                        <a href="./backpack.html"> Backpack </a>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="dropbtn" id="profile"> <i class="fa fa-user fa-5x"></i></button>
                        <div class="dropdown-content">
                            <p id="usernameOutput"> </p>
                            <a href="signup.html"> Switch Accounts </a> <!-- make dropdown in the future -->
                            <a class="noAccount" href="settings.html"> Settings </a>
                            <a href="signup.html" onclick="logOut()"> Log Out </a>
                        </div>
                </div> 
            </div>
        </nav>
    </header>

    <div class="controls">
        <button id="mode" style="position: relative;">
            <span id="modeText">Edit Mode</span>
            <span style="display: block; font-size: 10px; font-weight: normal; font-style: italic;color: #666; margin-top: 2px;">Press M to toggle</span>
        </button>
        <button id="generate">Generate Random Grid</button>
        <button id="newPattern">New Pattern</button>
        <button id="saveToBackpack">Save to Backpack</button>

        <div class="infoSpan">
            <span id="generation">Generation: 0</span>
            <span id="population">Population: 0</span>
        </div>
    </div>

    <main class="container">
        <aside id="patternInfo" class="pattern-info">
            <h3 id="patternTitle">Pattern</h3>
            <p id="patternDescription">No pattern loaded.</p>
            <p id="patternTags"></p></br/>

            <button id="start">▶</button>
            <button id="reset">↩</button>
            <button id="next">⏭</button>
            <button id="clear">🗑</button>
        </aside>
        <section id="gridWrapper" class="grid-wrapper"></section>
    </main>
    <br/>
    <br/>
</body>
</html>
