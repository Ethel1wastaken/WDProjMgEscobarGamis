<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conway's Playground">
    <meta name="keywords" content="Conway's Game of Life">
    <meta name="author" content="Joanna Escobar, Elijah Gamis">
    
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="conways_playground.css">
    <link rel="stylesheet" href="../dropdown.css">
    <link rel="stylesheet" href="../font-awesome-4.7.0/font-awesome-4.7.0/css/font-awesome.min.css">

    <style>
        .fa-angle-down {
            color: inherit;
        }

        .fa-search {
            color: inherit;
        }

        .fa-filter {
            color: inherit;
        }
    </style>

    <script src="../dropdown.js" defer></script>

    <script type="module" src="index_js_files/main.js"></script>

    <title>Conway's Game of Life</title>
</head>

<body>
    <header>
        <nav>
            <div class="navbar">
                <div id="siteLogo">
                    <a href="../home.html"> <img src="../assets/logoFinal.png" alt="Logo" title="Conway's Playground Logo" width="90vw" height="90vh"></a>
                    <h2 class="inline-header"> Conway's Playground </h2>
                </div>
                    
                <div class="dropdown">
                    <button class="dropbtn"> Create <i class="fa fa-angle-down"></i> </button>
                    <div class="dropdown-content">
                        <a href="./index.html"> Maker </a>
                        <a href="./backpack.html"> Backpack </a>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="dropbtn" id="profile"> <i class="fa fa-user fa-5x"></i></button>
                        <div class="dropdown-content">
                            <p id="usernameOutput"> </p>
                            <a href="signup.html"> Switch Accounts </a> <!-- make dropdown in the future -->
                            <a class="noAccount" href="settings.html"> Settings </a>
                            <a href="signup.html" onclick="logOut()"> Log Out </a>
                        </div>
                </div> 
            </div>
        </nav>
    </header>

    <main class="grid-container">
        <section id="gridWrapper" class="grid-wrapper"></section>

        <!-- Top Left: Playback -->
        <div class="controls-playback">
            <button id="prevGen" title="Previous">−1</button>
            <button id="playPause" title="Play">▶</button>
            <button id="nextGen" title="Next">+1</button>
            <button id="clearGrid" title="Clear">Clear</button>
            <button id="restartGen" title="Restart">↩</button>
        </div>

        <!-- Top Left: Mode -->
        <div class="controls-top-left">
            <button id="viewMode" title="View">View</button>
            <button id="selectMode" title="Select">Select</button>
            <button id="drawMode" title="Draw">Draw</button>
        </div>

        <!-- Top Right: Pattern Info -->
        <div class="controls-top-right">
            <div class="pattern-info">
                <button id="togglePatternInfo" class="toggle-btn">▼</button>
                <div id="patternPanel" class="pattern-panel">
                    <div class="info-item">
                        <label>Name:</label>
                        <input type="text" id="patternName" value="Pattern">
                    </div>
                    <div class="info-item">
                        <label>Description:</label>
                        <textarea id="patternDesc" rows="2"></textarea>
                    </div>
                    <div class="info-item">
                        <label>Last Edit:</label>
                        <span id="lastEdit">—</span>
                    </div>
                    <div class="info-item">
                        <label>Tags:</label>
                        <input type="text" id="patternTags" placeholder="tag1, tag2">
                    </div>
                    <div class="info-item">
                        <button id="newPattern" style="width: 100%; margin-top: 8px;">New Pattern</button>
                        <button id="saveBackpack" style="width: 100%; margin-top: 4px;">Save to Backpack</button>
                    </div>
                </div>
            </div>
            <div class="counters">
                <div id="generation">Gen: 0</div>
                <div id="population">Pop: 0</div>
            </div>
        </div>


    </main>
</body>
</html>
